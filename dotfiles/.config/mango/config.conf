# More option see https://github.com/DreamMaoMao/mango/wiki/

# sub config load
source=./mangocolors.conf
source=./environment.conf
source=./monitors.conf

# Autostart:
# Critical environment:
# exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_RUNTIME_DIR DISPLAY XAUTHORITY
exec-once=gnome-keyring-daemon --start --components=secrets,ssh,pkcs11
exec-once=/usr/lib/polkit-kde-authentication-agent-1
# Essential utilities:
exec-once=~/.local/bin/reload-xdg-portals
exec-once=hypridle
exec-once=~/.local/bin/poll-upower
# XWayland setup:
exec-once=xrdb -merge ~/.Xresources
exec-once=xsettingsd
# Systray applets:
exec-once=arch-update --tray
exec-once=fcitx5 -d
exec-once=copyq --start-server
exec-once=qs -c noctalia-shell
# Settings to prevent systemd from skipping the XF86PowerOff keybind:
exec-once=~/.local/bin/spawn-inhibitor


# Window effect
blur=0
blur_layer=0
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 0
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor= 0x000000ff

border_radius=6
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 1-horizontal,0-vertical
animations=1
layer_animations=1
animation_type_open=zoom
animation_type_close=fade
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.4
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=250
animation_duration_open=200
animation_duration_tag=150
animation_duration_close=100
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
edge_scroller_focus_allow_speed=0.0
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout Setting
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=1

# Dwindle Layout Setting
dwindle_smart_split=1
dwindle_drop_simple_split=1
dwindle_manual_split=0
dwindle_hsplit=1
dwindle_vsplit=1
dwindle_preserve_split=0

# Overview Setting
hotarea_size=10
enable_hotarea=0
ov_tab_mode=1
ov_no_resize=1
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=1
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1
drag_tile_small=1

# keyboard
repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=us

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=1
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance
gappih=5
gappiv=5
gappoh=10
gappov=10
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=4

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:dwindle
tagrule=id:2,layout_name:dwindle
tagrule=id:3,layout_name:dwindle
tagrule=id:4,layout_name:dwindle
tagrule=id:5,layout_name:dwindle
tagrule=id:6,layout_name:dwindle
tagrule=id:7,layout_name:dwindle
tagrule=id:8,layout_name:dwindle
tagrule=id:9,layout_name:dwindler

# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# Clipboard via CopyQ
bind=SUPER,v,spawn,copyq show

# Screenshot region and save to clipboard
bind=SUPER+SHIFT,s,spawn,grimblast --notify copy area
bind=NONE,Print,spawn,grimblast --notify copy screen

# Sleep on screen close or sleep button press, force lock on screen open
bind=NONE,XF86PowerOff,spawn_shell,qs -c noctalia-shell ipc call sessionMenu toggle
bind=NONE,XF86Sleep,spawn,systemctl suspend
switchbind=fold,spawn,systemctl suspend
switchbind=unfold,spawn,loginctl lock-session

# reload config
bind=SUPER+SHIFT,r,reload_config

# menu and terminal
bind=SUPER,Backspace,spawn,rofi -show favorites
bind=SUPER,Return,spawn,kitty
bind=SUPER,e,spawn_shell,~/.local/bin/emoji-launcher

# lockscreen
bind=SUPER,l,spawn,loginctl lock-session

# exit
bind=SUPER+SHIFT,l,spawn_shell,~/.local/bin/kill-inhibitor && mmsg dispatch quit
bind=SUPER,q,killclient

# switch window focus
bind=SUPER,Tab,focusstack,next
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down

# swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# switch window status
bind=ALT,g,toggleglobal,
bind=ALT,Tab,toggleoverview,
bind=SUPER,f,togglefloating,
bind=ALT,a,togglemaximizescreen,
bind=ALT,f,togglefullscreen,
bind=ALT+SHIFT,f,togglefakefullscreen,
bind=SUPER,i,minimized,
bind=SUPER,o,toggleoverlay,
bind=SUPER+SHIFT,I,restore_minimized
# bind=ALT,z,toggle_scratchpad

# scroller layout
bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset,
bind=alt+super+ctrl,Left,scroller_stack,left
bind=alt+super+ctrl,Right,scroller_stack,right
bind=alt+super+ctrl,Up,scroller_stack,up
bind=alt+super+ctrl,Down,scroller_stack,down

#dwindle layout(manual split mode)
bind=alt+shift,Return,dwindle_toggle_split_direction

# switch layout
bind=SUPER,n,switch_layout

# tag switch
# bind=SUPER,Left,viewtoleft,0
# bind=CTRL,Left,viewtoleft_have_client,0
# bind=SUPER,Right,viewtoright,0
# bind=CTRL,Right,viewtoright_have_client,0
# bind=CTRL+SUPER,Left,tagtoleft,0
# bind=CTRL+SUPER,Right,tagtoright,0

bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# Swipe with 3 fingers to cycle workspaces (tags)
# 3-finger: Window focus
gesturebind=NONE,right,3,viewtoleft
gesturebind=NONE,left,3,viewtoright
gesturebind=NONE,up,3,toggleoverview
gesturebind=NONE,down,3,toggleoverview

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# monitor switch
bind=alt+shift,Left,focusmon,left
bind=alt+shift,Right,focusmon,right
bind=SUPER+Alt,Left,tagmon,left
bind=SUPER+Alt,Right,tagmon,right

# gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps

# # movewin
# bind=CTRL+SHIFT,Up,movewin,+0,-50
# bind=CTRL+SHIFT,Down,movewin,+0,+50
# bind=CTRL+SHIFT,Left,movewin,-50,+0
# bind=CTRL+SHIFT,Right,movewin,+50,+0

# # resizewin
# bind=CTRL+ALT,Up,resizewin,+0,-50
# bind=CTRL+ALT,Down,resizewin,+0,+50
# bind=CTRL+ALT,Left,resizewin,-50,+0
# bind=CTRL+ALT,Right,resizewin,+50,+0

# Mouse Button Bindings
# btn_left and btn_right can't bind none mod key
mousebind=SUPER,btn_left,moveresize,curmove
# mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize

# Axis Bindings
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client

# Laptop multimedia keys for volume and LCD brightness
bind=NONE,XF86AudioRaiseVolume,spawn_shell,qs -c noctalia-shell ipc call volume increase # wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn_shell,qs -c noctalia-shell ipc call volume decrease # wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn_shell,qs -c noctalia-shell ipc call volume muteOutput # wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=NONE,XF86AudioMicMute,spawn_shell,qs -c noctalia-shell ipc call volume muteInput # wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind=NONE,XF86MonBrightnessUp,spawn_shell,qs -c noctalia-shell ipc call brightness increase # brightnessctl s 5%+
bind=NONE,XF86MonBrightnessDown,spawn_shell,qs -c noctalia-shell ipc call brightness decrease # brightnessctl s 5%-

# Requires playerctl
bind=NONE,XF86AudioPause,spawn_shell,qs -c noctalia-shell ipc call media playPause # playerctl play-pause
bind=NONE,XF86AudioPlay,spawn_shell,qs -c noctalia-shell ipc call media playPause # playerctl play-pause
bind=NONE,XF86AudioStop,spawn_shell,playerctl stop # playerctl stop (no equivalent command in noctalia-shell)
bind=NONE,XF86AudioPrev,spawn_shell,qs -c noctalia-shell ipc call media previous # playerctl previous
bind=NONE,XF86AudioNext,spawn_shell,qs -c noctalia-shell ipc call media next # playerctl next

# layer rule
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:fade,layer_name:rofi


# Window rules:
# Float dialog and splash windows
windowrule=isfloating:1,appid:^(dialog)$
windowrule=isfloating:1,appid:^(splash)$

# Float xeyes
windowrule=isfloating:1,isglobal:1,appid:XEyes

# Window rules for picture-in-picture
# (case insensitive to capture both Firefox and Chromium browsers)
windowrule=isfloating:1,isglobal:1,title:(?i)^(picture-in-picture).*

# Window rules for copyq
windowrule=isfloating:1,width:720,height:450,appid:(com.github.hluk.copyq)

# Window rules for other apps/utilities
# windowrule=appid:org.pulseaudio.pavucontrol
# windowrule=appid:org.fcitx.fcitx5-config-qt
